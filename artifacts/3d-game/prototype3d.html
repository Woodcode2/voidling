<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0d0821">
    <title>VOIDLING · MAPLE ISLE (3D)</title>
    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; background: #0d0821; touch-action: none;
        font-family: system-ui, -apple-system, sans-serif; }
      #timer {
        position: fixed; top: 12px; left: 0; right: 0; text-align: center; z-index: 5;
        color: #fff; font-size: 40px; font-weight: 900; letter-spacing: 1px;
        text-shadow: 0 2px 6px rgba(0,0,0,0.5); pointer-events: none;
      }
      #devoured { position: fixed; top: 60px; left: 0; right: 0; text-align: center; z-index: 5;
        color: #d8c8ff; font-size: 14px; font-weight: 800; letter-spacing: 1px; pointer-events: none;
        text-shadow: 0 1px 3px rgba(0,0,0,0.5); }
      #board { position: fixed; top: 12px; left: 12px; z-index: 5; pointer-events: none;
        background: rgba(16,8,30,0.55); border-radius: 12px; padding: 8px 10px; backdrop-filter: blur(6px); }
      #board .row { display: flex; align-items: center; gap: 7px; font-size: 13px; font-weight: 800;
        color: #fff; padding: 2px 0; }
      #board .row.me { color: #ffe89a; }
      #board .dot { width: 10px; height: 10px; border-radius: 50%; flex: 0 0 auto; }
      #board .nm { flex: 1; min-width: 78px; }
      #board .sc { font-variant-numeric: tabular-nums; opacity: 0.9; }
      #form { position: fixed; bottom: 44px; left: 0; right: 0; text-align: center; z-index: 5;
        color: #fff; font-size: 13px; font-weight: 800; letter-spacing: 2px; opacity: 0.85; pointer-events: none;
        text-shadow: 0 1px 3px rgba(0,0,0,0.5); }
      /* hunger / power meter */
      #hunger { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); z-index: 5;
        width: 260px; height: 16px; border-radius: 9px; background: rgba(16,8,30,0.55); overflow: hidden;
        box-shadow: 0 1px 4px rgba(0,0,0,0.4); }
      #hunger .fill { height: 100%; width: 0%; border-radius: 9px;
        background: linear-gradient(90deg, #7b4fe0, #c9a6ff); transition: width 0.12s linear; }
      #hunger.ready .fill { box-shadow: 0 0 12px #c9a6ff; }
      #hungerlbl { position: fixed; bottom: 34px; left: 50%; transform: translateX(-50%); z-index: 5;
        font-size: 10px; font-weight: 800; letter-spacing: 2px; color: #d8c8ff; pointer-events: none; opacity: 0.9; }
      #banner { position: fixed; top: 96px; left: 0; right: 0; text-align: center; z-index: 6; pointer-events: none;
        color: #fff; font-size: 24px; font-weight: 900; letter-spacing: 1px; opacity: 0;
        text-shadow: 0 2px 10px rgba(0,0,0,0.6); }
      #banner.show { animation: bnr 2.2s ease forwards; }
      @keyframes bnr { 0%{opacity:0; transform:translateY(-8px)} 12%{opacity:1; transform:translateY(0)} 78%{opacity:1} 100%{opacity:0} }
      /* drag joystick */
      #joy { position: fixed; width: 128px; height: 128px; border-radius: 50%; z-index: 6;
        background: rgba(255,255,255,0.10); border: 2px solid rgba(255,255,255,0.28);
        transform: translate(-50%, -50%); pointer-events: none; display: none; }
      #joyNub { position: fixed; width: 52px; height: 52px; border-radius: 50%; z-index: 6;
        background: rgba(201,166,255,0.55); box-shadow: 0 0 14px rgba(172,108,255,0.5);
        transform: translate(-50%, -50%); pointer-events: none; display: none; }
      /* skin swatches */
      #skins { position: fixed; left: 14px; bottom: 18px; z-index: 6; display: flex; gap: 8px; }
      #skins button { width: 30px; height: 30px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.35);
        cursor: pointer; padding: 0; transition: transform 0.1s, border-color 0.15s; }
      #skins button.sel { border-color: #fff; transform: scale(1.2); box-shadow: 0 0 10px rgba(255,255,255,0.4); }
      /* touch power buttons */
      #powers { position: fixed; right: 14px; bottom: 18px; z-index: 6; display: flex; flex-direction: column; gap: 9px; }
      #powers button { width: 74px; height: 46px; border-radius: 13px; border: none; cursor: pointer;
        font-family: inherit; font-size: 11px; font-weight: 900; letter-spacing: 0.5px; color: #fff;
        background: rgba(74,42,128,0.75); box-shadow: 0 2px 8px rgba(0,0,0,0.35); transition: opacity 0.15s, transform 0.08s; }
      #powers button:active { transform: scale(0.94); }
      #powers button.off { opacity: 0.32; }
      #powers button b { display: block; font-size: 14px; color: #c9a6ff; }
      /* EVOLVED flash */
      #evolve { position: fixed; top: 40%; left: 0; right: 0; text-align: center; z-index: 7; pointer-events: none;
        color: #fff; font-weight: 900; opacity: 0; }
      #evolve .big { font-size: 46px; letter-spacing: 2px; text-shadow: 0 0 24px rgba(172,108,255,0.9); }
      #evolve .sm { font-size: 16px; letter-spacing: 4px; color: #c9a6ff; }
      #evolve.show { animation: ev 1.8s ease forwards; }
      @keyframes ev { 0%{opacity:0; transform:scale(0.7)} 18%{opacity:1; transform:scale(1.05)} 70%{opacity:1; transform:scale(1)} 100%{opacity:0; transform:scale(1.1)} }
      /* title card */
      #titlecard { position: fixed; inset: 0; z-index: 8; display: flex; flex-direction: column;
        align-items: center; justify-content: center; pointer-events: none; text-align: center; color: #fff;
        animation: cardFade 4.2s ease forwards; }
      #titlecard .lvl { font-size: 15px; font-weight: 800; letter-spacing: 6px; opacity: 0.85; color: #c9a6ff; }
      #titlecard .name { font-size: 62px; font-weight: 900; letter-spacing: 1px; margin-top: 6px;
        text-shadow: 0 4px 24px rgba(123,79,224,0.7), 0 2px 6px rgba(0,0,0,0.5); }
      #titlecard .sub { font-size: 15px; font-weight: 700; opacity: 0.8; margin-top: 10px; letter-spacing: 1px; }
      @keyframes cardFade { 0%{opacity:0; transform:translateY(10px) scale(0.98)} 14%{opacity:1; transform:translateY(0) scale(1)} 72%{opacity:1} 100%{opacity:0; transform:translateY(-6px) scale(1.02)} }
      /* end screen */
      #end { position: fixed; inset: 0; z-index: 9; display: none; flex-direction: column;
        align-items: center; justify-content: center; background: rgba(13,8,33,0.82); backdrop-filter: blur(8px);
        color: #fff; text-align: center; }
      #end.show { display: flex; }
      #end .hd { font-size: 44px; font-weight: 900; letter-spacing: 1px; margin-bottom: 4px; }
      #end .sub { font-size: 15px; font-weight: 700; opacity: 0.8; letter-spacing: 2px; margin-bottom: 20px; }
      #end .list { min-width: 260px; }
      #end .er { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 800;
        padding: 8px 14px; border-radius: 12px; margin: 4px 0; background: rgba(255,255,255,0.06); }
      #end .er.me { background: rgba(255,232,154,0.16); color: #ffe89a; }
      #end .er .dot { width: 13px; height: 13px; border-radius: 50%; }
      #end .er .nm { flex: 1; text-align: left; }
      #end .er .sc { font-variant-numeric: tabular-nums; }
      #end .again { margin-top: 22px; font-size: 14px; font-weight: 800; letter-spacing: 2px; color: #c9a6ff; }
    </style>
  </head>
  <body>
    <div id="timer">3:30</div>
    <div id="devoured">0% DEVOURED</div>
    <div id="board"></div>
    <div id="form">VOIDLING</div>
    <div id="banner"></div>
    <div id="hungerlbl">DRAG or WASD to steer · HUNGER fuels powers</div>
    <div id="hunger"><div class="fill"></div></div>
    <div id="joy"></div><div id="joyNub"></div>
    <div id="skins"></div>
    <div id="powers">
      <button id="pw1"><b>1</b>GULP</button>
      <button id="pw2"><b>2</b>ROCKET</button>
      <button id="pw3"><b>3</b>COLLAPSE</button>
    </div>
    <div id="evolve"><div class="big"></div><div class="sm">EVOLVED</div></div>
    <div id="titlecard">
      <div class="lvl">LEVEL 1</div>
      <div class="name">MAPLE&nbsp;ISLE</div>
      <div class="sub">the little void is hungry · eat the island</div>
    </div>
    <div id="end">
      <div class="hd" id="endHd">TIME!</div>
      <div class="sub" id="endSub"></div>
      <div class="list" id="endList"></div>
      <div class="again">refresh to play again</div>
    </div>
    <script type="module" src="/src/prototype3d.ts"></script>
  </body>
</html>
