name: fetch-assets
# Utility: download externally generated art (e.g. AI icon candidates) into the
# repo, since the dev container's egress proxy blocks the asset CDN.
# Usage: push a .github/asset-manifest.txt whose first line is the repo-relative
# dest dir and remaining lines are URLs (one per line).
on:
  push:
    # never on main — merging a manifest change to main must not re-run the
    # fetch there (it committed duplicate candidate files directly to main)
    branches-ignore:
      - main
    paths:
      - '.github/asset-manifest.txt'

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ffmpeg
        run: sudo apt-get update -q && sudo apt-get install -y -q ffmpeg
      - name: Download assets
        run: |
          dest=$(head -n1 .github/asset-manifest.txt)
          mkdir -p "$dest"
          i=0
          tail -n +2 .github/asset-manifest.txt | while read -r u; do
            [ -z "$u" ] && continue
            case "$u" in \#*) continue ;; esac
            i=$((i+1))
            ext="${u##*.}"; ext="${ext%%\?*}"
            curl -fsSL "$u" -o "$dest/candidate-$i.$ext"
          done
          # m4a/AAC doesn't decode in open-source Chromium builds — transcode to
          # universally-supported MP3 and drop the original.
          for f in "$dest"/candidate-*.m4a; do
            [ -e "$f" ] || continue
            ffmpeg -y -loglevel error -i "$f" -codec:a libmp3lame -b:a 160k "${f%.m4a}.mp3"
            rm "$f"
          done
          ls -la "$dest"
      - name: Commit
        run: |
          dest=$(head -n1 .github/asset-manifest.txt)
          git config user.name "voidling-assets-bot"
          git config user.email "actions@github.com"
          git add "$dest"
          git commit -m "assets: fetch icon candidates" || echo "nothing to commit"
          git push
